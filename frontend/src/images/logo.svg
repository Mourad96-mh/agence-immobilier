<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 252 58" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8B6508"/>
      <stop offset="35%"  stop-color="#F5D060"/>
      <stop offset="60%"  stop-color="#C9940A"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F5D060"/>
      <stop offset="100%" stop-color="#9A7208"/>
    </linearGradient>
  </defs>

  <!-- ── M lettermark ── -->

  <!-- Outer M silhouette -->
  <path d="M3 51 L12 5 L29 32 L46 5 L55 51"
        stroke="url(#gold)" stroke-width="2.4"
        stroke-linejoin="miter" stroke-linecap="round"/>

  <!-- Left inner triangle detail -->
  <line x1="4"  y1="51" x2="19" y2="23" stroke="url(#gold)" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="12" y1="5"  x2="19" y2="23" stroke="url(#gold)" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Right inner triangle detail -->
  <line x1="54" y1="51" x2="39" y2="23" stroke="url(#gold)" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="46" y1="5"  x2="39" y2="23" stroke="url(#gold)" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Central diamond -->
  <path d="M29 11 L36 28 L29 45 L22 28 Z"
        stroke="url(#goldV)" stroke-width="1.4" fill="none"/>

  <!-- Small top column inside diamond -->
  <line x1="29" y1="5" x2="29" y2="11" stroke="url(#gold)" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Base line -->
  <line x1="3" y1="51" x2="55" y2="51"
        stroke="url(#gold)" stroke-width="1.6" stroke-linecap="round"/>

  <!-- ── Wordmark ── -->

  <!-- MECALUS -->
  <text x="70" y="27"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22"
        font-weight="700"
        letter-spacing="5"
        fill="white"
        dominant-baseline="middle">MECALUS</text>

  <!-- Thin gold rule -->
  <line x1="70" y1="38" x2="174" y2="38"
        stroke="url(#gold)" stroke-width="0.7" opacity="0.65"/>

  <!-- LUXURY REAL ESTATE -->
  <text x="70" y="49"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="7.5"
        letter-spacing="3.8"
        fill="#C9940A"
        dominant-baseline="middle">LUXURY REAL ESTATE</text>
</svg>
